spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---
# ════════════════════════════════════════════════════════════════
# DEFAULT / PRODUCTION Profile
# Activated on Render (where env vars are set)
# ════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: "!dev"
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

---
# ════════════════════════════════════════════════════════════════
# DEV Profile (default for local development)
# Uses H2 in-memory database — no external dependencies needed
# ════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:skillforgedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

---
# ════════════════════════════════════════════════════════════════
# Shared Configuration (all profiles)
# ════════════════════════════════════════════════════════════════
app:
  jwt:
    secret: ${JWT_SECRET:skillforge-dev-secret-key-minimum-32-bytes-for-hs256-signing}
    expiration: ${JWT_EXPIRATION:86400000}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5173}

server:
  port: ${PORT:8080}
